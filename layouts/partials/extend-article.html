{{ if .Params.glossary }}
<aside class="sticky top-16 hidden lg:block space-y-8 text-sm">

  <div>
    <h3 class="text-xs font-mono uppercase tracking-widest text-neutral-400 dark:text-neutral-500 mb-4">
      Glossaire
    </h3>
    <dl class="space-y-4">
      {{ range .Params.glossary }}
      <div class="border-l-2 border-neutral-200 dark:border-neutral-700 pl-3">
        <dt class="font-medium text-neutral-800 dark:text-neutral-200">{{ .term }}</dt>
        <dd class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5 leading-relaxed">{{ .def }}</dd>
      </div>
      {{ end }}
    </dl>
  </div>

  {{ if .Params.links }}
  <div>
    <h3 class="text-xs font-mono uppercase tracking-widest text-neutral-400 dark:text-neutral-500 mb-4">
      Liens utiles
    </h3>
    <ul class="space-y-2">
      {{ range .Params.links }}
      <li>
        <a href="{{ .url }}" target="_blank"
           class="text-xs text-blue-500 hover:text-blue-600 dark:hover:text-blue-400 hover:underline">
          → {{ .label }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
  {{ end }}

</aside>
{{ end }}
